<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEIA Client Operations Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .topbar {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: #111827;
    }

    .topbar h1 {
      margin: 0 0 6px 0;
      font-size: 28px;
    }

    .topbar p {
      margin: 0;
      color: #cbd5e1;
      font-size: 14px;
    }

    .frame-wrap {
      padding: 0;
      width: 100%;
      height: calc(100vh - 88px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>DEIA Client Operations Dashboard</h1>
    <p>Live operations dashboard powered by Google Sheets</p>
  </div>

  <div class="frame-wrap">
    <iframe
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSaNZPkxFq9WIQWDkd3HAkjcQqEgMKtLSN0Tgo1VMQJ8q8T3dQ4OhvH6Z7ODKx-RpZw-kJcYNBHRXJh/pubhtml?gid=816628570&single=true"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
